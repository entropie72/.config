format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$character"""

[directory]
style = "bold green"
truncation_length = 3
truncate_to_repo = false
truncation_symbol = "≤░Θα "

[character]
success_symbol = "[έζψ](purple)"
error_symbol = "[έζψ](red)"
vicmd_symbol = "[έζχ](green)"

[git_branch]
symbol = "ΎΡα "
format = "$symbol[$branch ]($style)"
style = "bright-black"

[git_status]
format = "[[($conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "ΌΚ╣ "
ahead = "ΎΖ╢ "
untracked = "ΎΕρ "
modified = "ΎΕς "
staged = "ΎΒπ "
renamed = "ΎΕΒ "
deleted = "ΎΣπ "
stashed = "έΚκ"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
symbol = "ΌΙ╡ "
format = "[$virtualenv]($style) "
style = "bright-black"

